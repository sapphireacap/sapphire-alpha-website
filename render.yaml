services:
  - type: web
    name: sapphire-alpha-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: EMERGENT_EMAIL_KEY
        sync: false
      - key: EMAIL_FROM_NAME
        sync: false
      - key: NOTIFY_EMAIL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DEFINEDGE_API_TOKEN
        sync: false
      - key: DEFINEDGE_API_SECRET
        sync: false
      - key: CRON_SECRET
        sync: false
