name: Definedge Auto Refresh

on:
  schedule:
    # */5 3-10 * * 1-5 (UTC) ~= every 5 min, 08:30-16:29 IST, Mon-Fri.
    # Wraps the real 9:15-15:30 IST market window with margin; the backend's
    # own _is_market_open check enforces the precise cutoff, so this cron
    # doesn't need to be exact. Also doubles as a Render free-tier keep-alive
    # ping, since an inbound request wakes a sleeping instance.
    - cron: "*/5 3-10 * * 1-5"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Definedge auto-refresh
        run: |
          curl -sf -m 60 -X POST "${{ secrets.BACKEND_URL }}/api/admin/definedge/auto-refresh" \
            -H "X-Cron-Key: ${{ secrets.CRON_SECRET }}"
